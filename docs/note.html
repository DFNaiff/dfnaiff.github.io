<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Note — Danilo Naiff</title>
<link rel="stylesheet" href="style.css">
<!-- KaTeX for math (loaded from CDN; the only runtime dependency, and only on note pages) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>

<nav class="topbar">
  <button class="toggle" id="lang-toggle" aria-label="Toggle language">
    <span class="en"><span class="on">EN</span> · PT</span>
    <span class="pt">EN · <span class="on">PT</span></span>
  </button>
  <button class="toggle" id="theme-toggle" aria-label="Toggle theme">THEME</button>
</nav>

<main class="wrap article">
  <p class="backlink"><a href="index.html">← <span class="en">home</span><span class="pt">início</span></a></p>
  <div class="article-head">
    <p class="article-meta" id="meta"></p>
    <h1 id="title">…</h1>
  </div>
  <article class="prose" id="content"></article>
</main>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
// Custom LaTeX macros carried over from the old MathJax config, so shorthands like
// \inner, \norm, \trace, \pastfuture keep working. KaTeX renders each math fragment in
// isolation, so these must be supplied here (a \newcommand inside one $$...$$ would not
// carry to the next).
var KATEX_MACROS = {
  "\\ket": "\\left| #1 \\right\\rangle",
  "\\bra": "\\left\\langle #1 \\right|",
  "\\braket": "\\left\\langle #1 \\middle| #2 \\right\\rangle",
  "\\inner": "\\left\\langle #1 , #2 \\right\\rangle",
  "\\mean": "\\left\\langle #1 \\right\\rangle",
  "\\abs": "\\left| #1 \\right|",
  "\\norm": "\\left\\| #1 \\right\\|",
  "\\trace": "\\text{tr}\\left( #1 \\right)",
  "\\ptrace": "\\text{tr}_{#1}\\left( #2 \\right)",
  "\\pderiv": "\\frac{\\partial #1}{\\partial #2}",
  "\\evalat": "\\left. #1 \\right|_{#2}",
  "\\pderivat": "\\left. \\frac{\\partial #1}{\\partial #2} \\right|_{#3}",
  "\\past": "\\overleftarrow{#1}",
  "\\future": "\\overrightarrow{#1}",
  "\\pastfuture": "\\overleftrightarrow{#1}"
};

// KaTeX (unlike the old MathJax) rejects a bare operator as a sub/superscript, e.g.
// \sigma_\max. Auto-brace them (\sigma_\max -> \sigma_{\max}) so such formulas still render.
var KATEX_OPS = /([_^])\\(max|min|sup|inf|limsup|liminf|lim|arg|det|gcd|deg|dim|ker|hom|Pr|sin|cos|tan|cot|sec|csc|sinh|cosh|tanh|coth|exp|log|ln|lg)(?![A-Za-z])/g;

(function () {
  var params = new URLSearchParams(location.search);
  var slug = (params.get("slug") || "").replace(/[^a-z0-9\-_]/gi, "");
  var titleEl = document.getElementById("title");
  var metaEl = document.getElementById("meta");
  var contentEl = document.getElementById("content");

  if (!slug) { fail("No note specified."); return; }

  fetch("notes/index.json", { cache: "no-cache" })
    .then(function (r) { return r.json(); })
    .then(function (index) {
      var meta = (index.notes || []).find(function (n) { return n.slug === slug; });
      if (meta) {
        titleEl.textContent = meta.title;
        document.title = meta.title + " — Danilo Naiff";
        metaEl.textContent = [meta.date, meta.kind || "note"].filter(Boolean).join(" · ").toUpperCase();
      }
      return fetch("notes/" + slug + ".md", { cache: "no-cache" });
    })
    .then(function (r) {
      if (!r.ok) throw new Error("not found");
      return r.text();
    })
    .then(function (md) { render(md); })
    .catch(function () { fail("This note could not be loaded."); });

  function render(md) {
    // Private-use sentinels that never occur in real prose.
    var C0 = String.fromCharCode(0xF000), C1 = String.fromCharCode(0xF001);
    var M0 = String.fromCharCode(0xF002), M1 = String.fromCharCode(0xF003);
    var codeRe = new RegExp(C0 + "(\\d+)" + C1, "g");
    var mathRe = new RegExp(M0 + "(\\d+)" + M1, "g");

    // 1) protect code so the math pass never reaches inside it
    var store = [];
    function stash(s) { store.push(s); return C0 + (store.length - 1) + C1; }
    md = md.replace(/```[\s\S]*?```/g, stash).replace(/`[^`\n]*`/g, stash);

    // 2) protect math (display first, then inline), keeping the raw delimiters
    var math = [];
    function stashMath(s) { math.push(s); return M0 + (math.length - 1) + M1; }
    md = md.replace(/\$\$[\s\S]*?\$\$/g, stashMath)
           .replace(/\\\[[\s\S]*?\\\]/g, stashMath)
           .replace(/\\\([\s\S]*?\\\)/g, stashMath)
           .replace(/\$[^$\n]+?\$/g, stashMath);

    // 3) restore code so markdown renders it normally
    md = md.replace(codeRe, function (_, i) { return store[+i]; });

    // 4) markdown -> HTML
    marked.setOptions({ breaks: false, gfm: true });
    var html = marked.parse(md);

    // 5) put the untouched math back, then render it
    html = html.replace(mathRe, function (_, i) {
      // restore any code sentinels that landed inside math (e.g. `` in \text{``...''}),
      // then auto-brace bare operators, before KaTeX renders it
      return math[+i]
        .replace(codeRe, function (_, j) { return store[+j]; })
        .replace(KATEX_OPS, "$1{\\$2}");
    });
    contentEl.innerHTML = html;

    if (window.renderMathInElement) {
      renderMathInElement(contentEl, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "\\[", right: "\\]", display: true },
          { left: "$", right: "$", display: false },
          { left: "\\(", right: "\\)", display: false }
        ],
        macros: KATEX_MACROS,
        throwOnError: false,
        strict: false
      });
    }
  }

  function fail(msg) {
    titleEl.textContent = msg;
    metaEl.textContent = "";
    contentEl.innerHTML = '<p><a href="writing.html">See all notes →</a></p>';
  }
})();
</script>
</body>
</html>
